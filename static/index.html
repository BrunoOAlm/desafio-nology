<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashback · Calculadora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <main class="card">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        Programa de cashback
      </div>

      <h1 class="title">Calculadora de <em>Cashback</em></h1>
      <p class="subtitle">
        Escolha o tipo de cliente e o valor da compra para ver quanto volta
        para o seu bolso.
      </p>

      <form id="cashback-form" class="form">
        <div class="field">
          <span class="field-label">Tipo de cliente</span>
          <div class="segmented" role="radiogroup" aria-label="Tipo de cliente">
            <input type="radio" name="client_type" id="ct-vip" value="vip" checked />
            <label for="ct-vip">VIP</label>
            <input type="radio" name="client_type" id="ct-regular" value="regular" />
            <label for="ct-regular">Comum</label>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="purchase-amount">Valor da compra</label>
          <div class="amount">
            <span class="amount-currency">R$</span>
            <input
              id="purchase-amount"
              type="number"
              step="0.01"
              min="0"
              inputmode="decimal"
              placeholder="0,00"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn">
          <span>Calcular cashback</span>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </form>

      <div id="result" class="result" hidden>
        <span class="result-label">Seu cashback</span>
        <div class="result-value" id="result-value">R$ 0,00</div>
        <p class="result-meta" id="result-meta"></p>
      </div>

      <section class="history">
        <div class="history-head">
          <h2>Suas consultas</h2>
          <span class="history-tag">somente do seu IP</span>
        </div>
        <div class="history-wrap">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Compra</th>
                <th>Cashback</th>
                <th>Quando</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
