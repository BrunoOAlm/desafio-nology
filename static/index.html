<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Cashback</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <header>
        <h1>Calculadora de Cashback</h1>
        <p class="subtitle">Informe o tipo de cliente e o valor da compra.</p>
      </header>

      <form id="cashback-form">
        <label for="client-type">Tipo de cliente</label>
        <select id="client-type" required>
          <option value="vip">VIP</option>
          <option value="regular">Comum</option>
        </select>

        <label for="purchase-amount">Valor da compra (R$)</label>
        <input
          id="purchase-amount"
          type="number"
          step="0.01"
          min="0"
          placeholder="Ex: 600.00"
          required
        />

        <button type="submit">Calcular cashback</button>
      </form>

      <p id="result" class="result" hidden></p>

      <section class="history">
        <h2>Histórico das suas consultas</h2>
        <p class="history-hint">Mostra apenas as consultas feitas a partir do seu IP.</p>
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Compra</th>
              <th>Cashback</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
