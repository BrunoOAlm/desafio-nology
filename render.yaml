# Render Blueprint - deploys the API + a PostgreSQL database in one go.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cashback-nology
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cashback-db
          property: connectionString

databases:
  - name: cashback-db
    plan: free
